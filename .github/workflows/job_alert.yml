name: Hourly Job Alert

on:
  schedule:
    - cron: '0 9,18 * * *'
  workflow_dispatch:

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # ✅ UPDATE THIS STEP (IMPORTANT)
      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run the job alert script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Save seen jobs back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add jobs_seen.json || true
          git diff --staged --quiet || git commit -m "Update seen jobs"
          git push
